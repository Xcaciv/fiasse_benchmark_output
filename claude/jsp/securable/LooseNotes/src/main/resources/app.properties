# LooseNotes Application Properties
# All runtime-sensitive values (db password, SMTP credentials) should be
# supplied via environment variables or a secrets manager, not committed here.

# ─── Database ───────────────────────────────────────────────────────────────
# H2 file-based database for development; override via env DB_URL etc. in prod
db.url=jdbc:h2:./data/loosenotes;AUTO_SERVER=TRUE;DB_CLOSE_DELAY=-1;MODE=MySQL
db.driver=org.h2.Driver
db.username=sa
db.password=
db.pool.maxSize=20
db.pool.minIdle=2
db.pool.connectionTimeout=30000

# ─── Application ────────────────────────────────────────────────────────────
app.name=LooseNotes
app.baseUrl=http://localhost:8080/loose-notes
# Maximum note content length (bytes)
app.note.maxContentLength=65536
# Maximum note title length (chars)
app.note.maxTitleLength=255

# ─── File Upload ────────────────────────────────────────────────────────────
# Absolute path; use env var UPLOAD_DIR in production
upload.dir=./uploads
# Maximum single file size in bytes (5 MB)
upload.maxFileSize=5242880
# Allowed MIME types (comma-separated) – validated server-side
upload.allowedMimeTypes=application/pdf,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document,text/plain,image/png,image/jpeg

# ─── Password Reset Token ───────────────────────────────────────────────────
# Token validity in seconds (3600 = 1 hour)
token.resetExpireSeconds=3600

# ─── Session ────────────────────────────────────────────────────────────────
# Idle timeout in seconds (30 min)
session.timeoutSeconds=1800

# ─── Rate Limiting ──────────────────────────────────────────────────────────
# Max login attempts per IP within window
rateLimit.login.maxAttempts=5
# Window duration in seconds
rateLimit.login.windowSeconds=300
# Max registration attempts per IP within window
rateLimit.register.maxAttempts=3
rateLimit.register.windowSeconds=600

# ─── Email (stub logging in development) ────────────────────────────────────
email.enabled=false
email.from=noreply@loosenotes.example.com
