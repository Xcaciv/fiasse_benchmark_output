# ============================================================
# Loose Notes Application Configuration
# SSEM: Modifiability - centralized configuration
# SSEM: Confidentiality - no secrets stored here
#        Secrets must come from environment variables
# ============================================================

# Database (H2 embedded, file-based persistence)
db.url=jdbc:h2:file:./data/loosenotes;MODE=PostgreSQL;AUTO_SERVER=TRUE
db.driver=org.h2.Driver
db.pool.minIdle=2
db.pool.maxPoolSize=10
db.pool.connectionTimeout=30000
db.pool.idleTimeout=600000
db.pool.maxLifetime=1800000

# File storage
# SSEM: Availability - set upload limits
file.upload.maxSizeBytes=10485760
file.upload.allowedExtensions=pdf,doc,docx,txt,png,jpg,jpeg
file.upload.directory=./uploads

# Session configuration
# SSEM: Authenticity - session timeout
session.timeoutMinutes=30

# Rate limiting (SSEM: Availability)
ratelimit.login.maxAttempts=5
ratelimit.login.windowSeconds=900

# Password reset token validity (SSEM: Authenticity)
password.reset.tokenValidityMinutes=60

# Note content limits (SSEM: Integrity)
note.title.maxLength=255
note.content.maxLength=50000
note.search.excerptLength=200

# Rating settings (SSEM: Integrity)
rating.comment.maxLength=1000
rating.topRated.minRatings=3

# Admin
admin.pageSize=25

# Application base URL (for generating share links and reset emails)
# Override with APP_BASE_URL environment variable in production
app.baseUrl=http://localhost:8080/loose-notes
